<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>레트로 너구리 (Neoguri Arcade)</title>
    <style>
        /* 기본 레이아웃 스타일 설정 */
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0b16;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace, 'Malgun Gothic';
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 게임 본체 케이스 (레트로 아케이드 머신 테두리) */
        .arcade-cabinet {
            background: linear-gradient(145deg, #181829, #0f0f1d);
            border: 4px solid #3b3b5c;
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8), 
                        0 0 30px rgba(59, 59, 92, 0.3);
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 900px;
            width: 100%;
        }

        /* 스피커 그릴 및 기기 상단 데코 */
        .cabinet-header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 12px 12px 12px;
            border-bottom: 2px solid #2d2d44;
            margin-bottom: 12px;
        }
        .retro-brand {
            font-size: 20px;
            font-weight: bold;
            color: #38bdf8;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.6);
            letter-spacing: 2px;
        }
        
        /* 세련된 사운드 활성화 버튼 디자인 */
        .sound-btn {
            background: radial-gradient(circle, #e11d48 0%, #9f1239 100%);
            border: 2px solid #fb7185;
            border-radius: 6px;
            color: #fff;
            padding: 6px 14px;
            font-weight: bold;
            font-size: 11px;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.4);
            text-shadow: 1px 1px 2px #000;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
        }
        .sound-btn.active {
            background: radial-gradient(circle, #059669 0%, #047857 100%);
            border-color: #34d399;
            box-shadow: 0 0 12px rgba(52, 211, 153, 0.6);
        }
        .sound-btn:active {
            transform: scale(0.95);
        }

        .speaker-grill {
            display: flex;
            gap: 4px;
        }
        .speaker-bar {
            width: 3px;
            height: 12px;
            background-color: #3b3b5c;
            border-radius: 2px;
        }

        /* 캔버스 래퍼 */
        .canvas-container {
            position: relative;
            background-color: #000000;
            border: 6px solid #000000;
            border-radius: 4px;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 1);
            width: 100%;
            display: flex;
            justify-content: center;
            overflow: hidden;
        }

        canvas {
            display: block;
            background-color: #000000;
            width: 100%;
            max-width: 800px;
            height: auto;
            aspect-ratio: 8 / 5;
            image-rendering: pixelated;
        }

        /* 조작 가이드 설명 박스 */
        .controls-info {
            margin-top: 16px;
            background-color: #121225;
            border: 1.5px dashed #3b3b5c;
            border-radius: 8px;
            padding: 12px 20px;
            font-size: 13px;
            line-height: 1.6;
            color: #9cb3c9;
            text-align: center;
            width: 100%;
        }
        .key-badge {
            background-color: #1f1f3d;
            border: 1px solid #57578a;
            border-radius: 4px;
            padding: 1px 6px;
            color: #ffffff;
            font-weight: bold;
            display: inline-block;
            margin: 0 2px;
        }

        /* 가상 컨트롤러 (모바일 & 터치 인터페이스 대응용) */
        .virtual-controller {
            display: none; /* 터치 전용 혹은 스크롤 아래 배치 */
            width: 100%;
            margin-top: 20px;
            padding: 10px;
            background: linear-gradient(180deg, #131324, #0b0b16);
            border-top: 3px solid #2c2c44;
            border-radius: 12px;
            justify-content: space-between;
            align-items: center;
            touch-action: none;
        }
        .d-pad-grid {
            display: grid;
            grid-template-columns: repeat(3, 50px);
            grid-template-rows: repeat(3, 50px);
            gap: 5px;
        }
        .d-btn {
            background: radial-gradient(circle, #3a3a5c 0%, #20203a 100%);
            border: 2px solid #57578a;
            border-radius: 50%;
            color: #fff;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .d-btn:active {
            background: #4ade80;
            border-color: #86efac;
            transform: scale(0.95);
        }
        .d-empty {
            visibility: hidden;
        }
        .action-pad {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .jump-btn {
            width: 85px;
            height: 85px;
            background: radial-gradient(circle, #ff4d4d 0%, #b30000 100%);
            border: 3px solid #ff9999;
            border-radius: 50%;
            color: #fff;
            font-weight: bold;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 12px rgba(0,0,0,0.4);
            cursor: pointer;
            text-shadow: 1px 1px 2px #000;
        }
        .jump-btn:active {
            background: radial-gradient(circle, #ff8080 0%, #ff1a1a 100%);
            transform: scale(0.92);
        }

        /* 터치 지원 디바이스에서 컨트롤러 강제 활성화 */
        @media (max-width: 768px) {
            .virtual-controller {
                display: flex;
            }
        }
    </style>
</head>
<body>

    <!-- 아케이드 콘솔 프레임 -->
    <div class="arcade-cabinet">
        <div class="cabinet-header">
            <span class="retro-brand">RETRO CLASSICS</span>
            <!-- 사운드 토글 스위치 -->
            <button class="sound-btn" id="soundBtn">
                <span id="soundIcon">🔇</span> SOUND: OFF
            </button>
            <span class="retro-brand" style="color: #f43f5e; font-size: 14px;">1982 ORIGINAL</span>
        </div>

        <!-- 메인 게임 렌더링 영역 -->
        <div class="canvas-container">
            <canvas id="gameCanvas" width="800" height="500"></canvas>
        </div>

        <!-- 터치 조작 가상 패드 -->
        <div class="virtual-controller" id="touchController">
            <!-- 방향 조작 키 (D-PAD) -->
            <div class="d-pad-grid">
                <div class="d-empty"></div>
                <button class="d-btn" id="btnUp">▲</button>
                <div class="d-empty"></div>
                <button class="d-btn" id="btnLeft">◀</button>
                <div class="d-empty"></div>
                <button class="d-btn" id="btnRight">▶</button>
                <div class="d-empty"></div>
                <button class="d-btn" id="btnDown">▼</button>
                <div class="d-empty"></div>
            </div>

            <!-- 점프 조작 버튼 -->
            <div class="action-pad">
                <button class="jump-btn" id="btnJump">JUMP</button>
            </div>
        </div>

        <!-- 조작 안내문 -->
        <div class="controls-info">
            <span style="color: #38bdf8; font-weight: bold;">[PC 조작법]</span> 이동: 좌우 방향키 <span class="key-badge">◀</span> <span class="key-badge">▶</span> | 사다리 타기: 상하 방향키 <span class="key-badge">▲</span> <span class="key-badge">▼</span> | 점프: <span class="key-badge">Spacebar</span> (한 번 누르면 낮게, 연달아 두 번 누르면 높게 점프!)<br>
            <span style="color: #fb7185; font-weight: bold;">[게임 규칙]</span> 가시와 애벌레를 피해 모든 사과와 단지를 드세요! 낙하하면 체력을 잃습니다. 우측 상단의 <span style="color: #34d399; font-weight: bold;">SOUND 버튼</span>을 눌러 사운드를 ON/OFF 하실 수 있습니다!
        </div>
    </div>

    <!-- 게임 로직 스크립트 엔진 -->
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Web Audio API 오디오 칩셋 합성
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;
        let isSoundOn = false; // 기본값은 무음 시작 (Autoplay 차단 방지 정책 대응)

        const soundBtn = document.getElementById('soundBtn');
        const soundIcon = document.getElementById('soundIcon');

        // 사운드 버튼 UI 및 실제 활성/비활성 연동 갱신 함수
        function updateSoundButtonUI() {
            if (isSoundOn) {
                soundBtn.classList.add('active');
                soundBtn.innerHTML = '<span id="soundIcon">🔊</span> SOUND: ON';
            } else {
                soundBtn.classList.remove('active');
                soundBtn.innerHTML = '<span id="soundIcon">🔇</span> SOUND: OFF';
            }
        }

        // 사운드 엔진 초기화 함수
        async function initAudio() {
            try {
                if (!audioCtx) {
                    audioCtx = new AudioContext();
                }
                if (audioCtx.state === 'suspended') {
                    await audioCtx.resume();
                }
            } catch (e) {
                console.warn("오디오 초기화가 지연되고 있습니다:", e);
            }
        }

        // 사운드 합성기 메인 구동 장치 (isSoundOn 여부에 따른 완벽 통제)
        function playSound(type) {
            // 사운드가 꺼져있거나 오디오 드라이버가 초기화되기 전이면 무조건 즉시 반환(무음)
            if (!isSoundOn || !audioCtx) {
                return; 
            }
            if (audioCtx.state === 'suspended') {
                return;
            }
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            const now = audioCtx.currentTime;
            
            if (type === 'jump') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(160, now);
                osc.frequency.exponentialRampToValueAtTime(700, now + 0.15);
                gain.gain.setValueAtTime(0.12, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                osc.start(now);
                osc.stop(now + 0.15);
            } else if (type === 'highjump') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.exponentialRampToValueAtTime(1000, now + 0.2);
                gain.gain.setValueAtTime(0.14, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                osc.start(now);
                osc.stop(now + 0.2);
            } else if (type === 'pickup') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(650, now);
                osc.frequency.setValueAtTime(950, now + 0.08);
                gain.gain.setValueAtTime(0.08, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.18);
                osc.start(now);
                osc.stop(now + 0.18);
            } else if (type === 'pot') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(523.25, now); // C5
                osc.frequency.setValueAtTime(659.25, now + 0.07); // E5
                osc.frequency.setValueAtTime(783.99, now + 0.14); // G5
                gain.gain.setValueAtTime(0.06, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
                osc.start(now);
                osc.stop(now + 0.25);
            } else if (type === 'die') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(350, now);
                osc.frequency.linearRampToValueAtTime(60, now + 0.6);
                gain.gain.setValueAtTime(0.18, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
                osc.start(now);
                osc.stop(now + 0.6);
            } else if (type === 'win') {
                const notes = [523.25, 659.25, 783.99, 1046.50]; // C5, E5, G5, C6
                notes.forEach((freq, i) => {
                    const noteOsc = audioCtx.createOscillator();
                    const noteGain = noteOsc.context.createGain();
                    noteOsc.connect(noteGain);
                    noteGain.connect(audioCtx.destination);
                    noteOsc.type = 'square';
                    noteOsc.frequency.setValueAtTime(freq, now + i * 0.1);
                    noteGain.gain.setValueAtTime(0.06, now + i * 0.1);
                    noteGain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.1 + 0.15);
                    noteOsc.start(now + i * 0.1);
                    noteOsc.stop(now + i * 0.1 + 0.18);
                });
            } else if (type === 'gameover') {
                const notes = [392.00, 349.23, 311.13, 261.63]; // G4, F4, Eb4, C4
                notes.forEach((freq, i) => {
                    const noteOsc = audioCtx.createOscillator();
                    const noteGain = noteOsc.context.createGain();
                    noteOsc.connect(noteGain);
                    noteGain.connect(audioCtx.destination);
                    noteOsc.type = 'triangle';
                    noteOsc.frequency.setValueAtTime(freq, now + i * 0.2);
                    noteGain.gain.setValueAtTime(0.1, now + i * 0.2);
                    noteGain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.2 + 0.25);
                    noteOsc.start(now + i * 0.2);
                    noteOsc.stop(now + i * 0.2 + 0.25);
                });
            } else if (type === 'start') {
                const notes = [261.63, 329.63, 392.00, 329.63, 523.25]; // C4, E4, G4, E4, C5
                notes.forEach((freq, i) => {
                    const noteOsc = audioCtx.createOscillator();
                    const noteGain = noteOsc.context.createGain();
                    noteOsc.connect(noteGain);
                    noteGain.connect(audioCtx.destination);
                    noteOsc.type = 'sine';
                    noteOsc.frequency.setValueAtTime(freq, now + i * 0.12);
                    noteGain.gain.setValueAtTime(0.08, now + i * 0.12);
                    noteGain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.12 + 0.18);
                    noteOsc.start(now + i * 0.12);
                    noteOsc.stop(now + i * 0.12 + 0.18);
                });
            }
        }

        // --- 사운드 버튼 수동 잠금 해제 / ON-OFF 토글 리스너 ---
        soundBtn.addEventListener('click', async () => {
            isSoundOn = !isSoundOn; // 상태 토글
            
            if (isSoundOn) {
                await initAudio();
                updateSoundButtonUI();
                // 활성화 확인용 픽업 효과음 재생
                playSound('pickup');
            } else {
                updateSoundButtonUI();
            }
        });

        // 사용자의 간접 입력 제스처 감지 시 (사운드가 ON 상태일 때만 백그라운드 브라우저 잠금 자동 해제)
        const userGestures = ['click', 'keydown', 'touchstart', 'mousedown'];
        userGestures.forEach(gesture => {
            window.addEventListener(gesture, () => {
                if (isSoundOn && (!audioCtx || audioCtx.state === 'suspended')) {
                    initAudio();
                }
            }, { passive: true });
        });


        // --- 레트로 아케이드 맵 설정 데이터 ---
        const STAGES = [
            {
                // 스테이지 1: 비기너 코스
                platforms: [
                    { y: 440, segments: [{ x1: 0, x2: 250 }, { x1: 290, x2: 600 }] },

                ],

                ],

                ],

            {

                platforms: [

                    { x: 450, y: 40 }
                ],
                items: [
                    { type: 'apple', x: 50, y: 440 },
                    { type: 'apple', x: 330, y: 440 },
                    { type: 'pot', x: 560, y: 440 },
                    { type: 'apple', x: 60, y: 360 },
                    { type: 'apple', x: 240, y: 360 },
                    { type: 'apple', x: 520, y: 360 },
                    { type: 'apple', x: 120, y: 280 },
                    { type: 'pot', x: 500, y: 280 },
                    { type: 'apple', x: 50, y: 200 },
                    { type: 'apple', x: 350, y: 200 },
                    { type: 'apple', x: 580, y: 200 },
                    { type: 'apple', x: 100, y: 120 },
                    { type: 'pot', x: 480, y: 120 },
                    { type: 'apple', x: 80, y: 40 },
                    { type: 'apple', x: 350, y: 40 }
                ],
                enemies: [
                    { x: 100, y: 440, minX: 10, maxX: 210, speed: 1.6, dir: 1 },
                    { x: 250, y: 360, minX: 170, maxX: 410, speed: 1.5, dir: -1 },
                    { x: 150, y: 280, minX: 10, maxX: 290, speed: 1.7, dir: 1 },
                    { x: 400, y: 280, minX: 350, maxX: 590, speed: 1.4, dir: -1 },
                    { x: 400, y: 120, minX: 230, maxX: 590, speed: 1.8, dir: 1 },
                    { x: 450, y: 40, minX: 260, maxX: 570, speed: 1.5, dir: -1 }
                ],
                playerStart: { x: 560, y: 440 }
            }
        ];

        // --- 글로벌 게임 핵심 수치 정의 ---
        let score = 0;
        let topScore = 10000;
        let lives = 5;
        let credits = 5;
        let currentStageIndex = 0;
        let timer = 3000; // 스테이지 당 주어지는 만점 시간 보너스 프레임
        const maxTimer = 3000;

        // 게임 제어용 상태 머신
        // 'START' | 'INTRO' | 'PLAYING' | 'DYING' | 'CLEAR' | 'GAMEOVER'
        let gameState = 'START';
        let introTicks = 0;
        let clearTicks = 0;

        // 키 입력 맵
        const keys = {};

        // 터치용 입력 플래그
        let touchLeft = false;
        let touchRight = false;
        let touchUp = false;
        let touchDown = false;

        // 너구리 캐릭터 속성 객체
        const player = {
            x: 0,
            y: 0,
            width: 24,
            height: 28,
            vx: 0,
            vy: 0,
            facing: 'right',
            isGrounded: true,
            isClimbing: false,
            climbSpeed: 2,
            walkSpeed: 2.2,
            // 이단 조절식 점프 중력 가속 설정
            shortJumpForce: -4.5,   // 낮게 뛰기 (1회 입력)
            highJumpForce: -7.5,    // 높게 뛰기 (더블 클릭)
            jumpTime: 0,            // 첫 번째 점프 시점 마킹용 타임스탬프
            hasDoubleJumped: false, // 하이 점프 도달 여부
            jumpLockedDir: 0,       // 점프 중 고정되는 좌우 방향 (원작 피처)
            animFrame: 0,
            shieldTicks: 0,         // 물음표 단지 획득 무적시간
            speedBoostTicks: 0,     // 속도 버프 시간
            dyingY: 0,
            dyingVy: 0,
            dyingRot: 0
        };

        // 실시간 연출 효과 컨테이너
        let activeStage = null;
        let particles = [];
        let floatingTexts = [];

        // --- 특수 효과 엔진 (파티클 & 팝업 텍스트) ---
        function createParticles(x, y, color, count = 10) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 6,
                    vy: (Math.random() - 0.5) * 6 - 2,
                    radius: Math.random() * 3 + 1,
                    color: color,
                    alpha: 1,
                    decay: Math.random() * 0.03 + 0.02
                });
            }
        }

        function createFloatingText(text, x, y, color = '#ffffff') {
            floatingTexts.push({
                text: text,
                x: x,
                y: y,
                vy: -1,
                alpha: 1,
                ticks: 60
            });
        }

        // --- 게임 리로드 / 초기화 마크 ---
        function loadStage(index) {
            currentStageIndex = index;
            const stageData = STAGES[currentStageIndex];
            
            // 딥카피로 스테이지 데이터 독립 바인딩
            activeStage = {
                platforms: JSON.parse(JSON.stringify(stageData.platforms)),
                ladders: JSON.parse(JSON.stringify(stageData.ladders)),
                spikes: JSON.parse(JSON.stringify(stageData.spikes)),
                items: JSON.parse(JSON.stringify(stageData.items)),
                enemies: JSON.parse(JSON.stringify(stageData.enemies))
            };

            // 플레이어 스타트 포지셔닝
            player.x = stageData.playerStart.x;
            player.y = stageData.playerStart.y - player.height;
            player.vx = 0;
            player.vy = 0;
            player.isGrounded = true;
            player.isClimbing = false;
            player.jumpLockedDir = 0;
            player.hasDoubleJumped = false;
            player.jumpTime = 0;
            player.facing = player.x < 300 ? 'right' : 'left';
            player.shieldTicks = 0;
            player.speedBoostTicks = 0;

            timer = maxTimer;
            particles = [];
            floatingTexts = [];
            
            gameState = 'INTRO';
            introTicks = 120; // 2초간 인트로 출력
            playSound('start');
        }

        // --- 키 입력 이벤트 리스너 리스팅 ---
        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (e.code === 'Space') {
                if (gameState === 'PLAYING' || gameState === 'START' || gameState === 'GAMEOVER') {
                    e.preventDefault(); // 스페이스바 화면 스크롤 방지
                }
                
                // 이벤트 드리븐 조작 트리거 바인딩 (더블 탭 반응성 확보)
                if (gameState === 'PLAYING') {
                    attemptJump();
                } else if (gameState === 'START') {
                    startGame();
                } else if (gameState === 'GAMEOVER') {
                    resetFullGame();
                }
            }
        });

        window.addEventListener('keyup', (e) => {
            keys[e.code] = false;
        });

        // --- 터치 디바이스 가상 패드 바인딩 ---
        function setupTouchEvents(elementId, pressCallback, releaseCallback) {
            const btn = document.getElementById(elementId);
            if (!btn) return;

            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                pressCallback();
            });
            btn.addEventListener('touchend', (e) => {
                e.preventDefault();
                releaseCallback();
            });
            btn.addEventListener('mousedown', (e) => {
                pressCallback();
            });
            btn.addEventListener('mouseup', () => {
                releaseCallback();
            });
            btn.addEventListener('mouseleave', () => {
                releaseCallback();
            });
        }

        setupTouchEvents('btnLeft', () => { touchLeft = true; }, () => { touchLeft = false; });
        setupTouchEvents('btnRight', () => { touchRight = true; }, () => { touchRight = false; });
        setupTouchEvents('btnUp', () => { touchUp = true; }, () => { touchUp = false; });
        setupTouchEvents('btnDown', () => { touchDown = true; }, () => { touchDown = false; });

        // 점프는 터치 시 즉시 1회성 발동
        const jmpBtn = document.getElementById('btnJump');
        if (jmpBtn) {
            const triggerJump = (e) => {
                e.preventDefault();
                if (gameState === 'PLAYING') {
                    attemptJump();
                } else if (gameState === 'START') {
                    startGame();
                } else if (gameState === 'GAMEOVER') {
                    resetFullGame();
                }
            };
            jmpBtn.addEventListener('touchstart', triggerJump);
            jmpBtn.addEventListener('mousedown', triggerJump);
        }

        // 게임 스타트/재시작 트리거 공통 함수
        function startGame() {
            score = 0;
            lives = 5;
            loadStage(0);
        }

        function resetFullGame() {
            startGame();
        }

        // 점프 동작 개시 및 더블 탭 고도 제어 엔진
        function attemptJump() {
            if (player.isClimbing) return;

            if (player.isGrounded) {
                // [1차 입력] 숏 점프 (낮은 높이 도약)
                player.isGrounded = false;
                player.vy = player.shortJumpForce; // -4.5
                player.jumpTime = Date.now();
                player.hasDoubleJumped = false;
                
                // 점프 방향 락킹 판정 (원작 너구리의 커밋점프 메커니즘 유지)
                let moveDir = 0;
                if (keys['ArrowLeft'] || touchLeft) moveDir = -1;
                else if (keys['ArrowRight'] || touchRight) moveDir = 1;
                
                player.jumpLockedDir = moveDir;
                playSound('jump');

                // 미세 도약 가속 먼지 파티클 방출
                createParticles(player.x + player.width/2, player.y + player.height, '#9ca3af', 5);
            } else if (!player.isGrounded && !player.hasDoubleJumped) {
                // [2차 연속 입력 판단] 숏 점프 도중 짧은 윈도우 프레임 안에 한 번 더 스페이스를 눌렀는가 판정
                const timeSinceJump = Date.now() - player.jumpTime;
                if (timeSinceJump < 350) { // 350ms 안에 연타 입력 시 고고도 부스팅 점프로 업그레이드
                    player.vy = player.highJumpForce; // -7.5
                    player.hasDoubleJumped = true;

                    // 더블 점프 시 공중 방향 전환의 유연성을 제공하기 위해 락킹 벡터 추가 업데이트
                    let moveDir = 0;
                    if (keys['ArrowLeft'] || touchLeft) moveDir = -1;
                    else if (keys['ArrowRight'] || touchRight) moveDir = 1;
                    player.jumpLockedDir = moveDir;

                    playSound('highjump');

                    // 스페셜 하이 점프 이펙트 및 플로팅 텍스트 연출
                    createParticles(player.x + player.width/2, player.y + player.height, '#38bdf8', 12);
                    createFloatingText("HIGH JUMP!", player.x + player.width/2, player.y - 15, '#38bdf8');
                }
            }
        }

        // --- 물리 시뮬레이션 및 업데이트 엔진 ---
        function update() {
            // 버프 타이머 업데이트
            if (player.shieldTicks > 0) player.shieldTicks--;
            if (player.speedBoostTicks > 0) player.speedBoostTicks--;

            if (gameState === 'START') {
                return;
            }

            if (gameState === 'GAMEOVER') {
                return;
            }

            if (gameState === 'INTRO') {
                introTicks--;
                if (introTicks <= 0) {
                    gameState = 'PLAYING';
                }
                return;
            }

            if (gameState === 'CLEAR') {
                clearTicks--;
                // 타이머 잔량 점수로 환산 적립 이펙트
                if (timer > 0) {
                    const step = Math.min(20, timer);
                    timer -= step;
                    score += step * 2;
                    if (score > topScore) topScore = score;
                }
                if (clearTicks <= 0) {
                    const nextStage = (currentStageIndex + 1) % STAGES.length;
                    loadStage(nextStage);
                }
                return;
            }

            if (gameState === 'DYING') {
                player.dyingVy += 0.25; // 중력
                player.dyingY += player.dyingVy;
                player.dyingRot += 0.15;
                if (player.dyingY > 550) {
                    lives--;
                    if (lives <= 0) {
                        gameState = 'GAMEOVER';
                        playSound('gameover');
                    } else {
                        loadStage(currentStageIndex);
                    }
                }
                return;
            }

            // 플레이 모드 프레임 연산
            if (gameState === 'PLAYING') {
                // 시간 흐름 연산
                if (timer > 0) {
                    timer--;
                    if (timer === 0) {
                        triggerDeath();
                        return;
                    }
                }

                const currentSpeed = player.speedBoostTicks > 0 ? player.walkSpeed * 1.5 : player.walkSpeed;

                // 1. 좌우 이동 및 등반 정밀 물리 시뮬레이션
                if (player.isClimbing) {
                    // 사다리 등반 모드
                    player.vx = 0;
                    if (keys['ArrowUp'] || touchUp) {
                        player.vy = -player.climbSpeed;
                        player.animFrame++;
                    } else if (keys['ArrowDown'] || touchDown) {
                        player.vy = player.climbSpeed;
                        player.animFrame++;
                    } else {
                        player.vy = 0;
                    }

                    player.y += player.vy;

                    // 사다리 영역 검증 및 탈출 로직
                    const lad = player.climbLadder;
                    if (player.y + player.height <= lad.y1) {
                        // 사다리 상단 도달 탈출
                        player.y = lad.y1 - player.height;
                        player.isClimbing = false;
                        player.isGrounded = true;
                        player.vy = 0;
                    } else if (player.y + player.height >= lad.y2) {
                        // 사다리 하단 도달 탈출
                        player.y = lad.y2 - player.height;
                        player.isClimbing = false;
                        player.isGrounded = true;
                        player.vy = 0;
                    } else {
                        // 사다리 타는 도중 상하단 발판에서 방향키 입력 시 탈출
                        const checkFloors = activeStage.platforms;
                        for (let plat of checkFloors) {
                            if (Math.abs(player.y + player.height - plat.y) < 6) {
                                if (keys['ArrowLeft'] || touchLeft || keys['ArrowRight'] || touchRight) {
                                    player.y = plat.y - player.height;
                                    player.isClimbing = false;
                                    player.isGrounded = true;
                                    player.vy = 0;
                                    break;
                                }
                            }
                        }
                    }
                } else {
                    // 기본 지상/공중 걷기 모드
                    if (player.isGrounded) {
                        player.vy = 0;
                        if (keys['ArrowLeft'] || touchLeft) {
                            player.vx = -currentSpeed;
                            player.facing = 'left';
                            player.animFrame++;
                        } else if (keys['ArrowRight'] || touchRight) {
                            player.vx = currentSpeed;
                            player.facing = 'right';
                            player.animFrame++;
                        } else {
                            player.vx = 0;
                        }

                        // 사다리 탑승 트리거 체크
                        const upPressed = keys['ArrowUp'] || touchUp;
                        const downPressed = keys['ArrowDown'] || touchDown;
                        if (upPressed || downPressed) {
                            const playerCX = player.x + player.width / 2;
                            const playerCY = player.y + player.height;

                            for (let lad of activeStage.ladders) {
                                // 사다리 근처 정밀 얼라인 정렬 조건 검증
                                if (Math.abs(playerCX - lad.x) < 10) {
                                    if (upPressed && playerCY > lad.y1 && playerCY <= lad.y2 + 2) {
                                        player.x = lad.x - player.width / 2;
                                        player.isClimbing = true;
                                        player.climbLadder = lad;
                                        player.isGrounded = false;
                                        break;
                                    } else if (downPressed && playerCY >= lad.y1 - 2 && playerCY < lad.y2) {
                                        player.x = lad.x - player.width / 2;
                                        player.isClimbing = true;
                                        player.climbLadder = lad;
                                        player.isGrounded = false;
                                        player.y += 6; // 발판 통과 진입
                                        break;
                                    }
                                }
                            }
                        }
                    } else {
                        // 점프 등 공중 낙하 시물레이션 (좌우 강제 고정)
                        player.vy += 0.25; // 중력 적용값
                        player.vx = player.jumpLockedDir * currentSpeed;
                    }

                    // 위치 갱신
                    player.x += player.vx;
                    player.y += player.vy;

                    // 스테이지 좌우 경계 제어
                    if (player.x < 0) player.x = 0;
                    if (player.x + player.width > 600) player.x = 600 - player.width;

                    // 낙하 판정 및 낙사 예방 발판 충돌 필터링
                    if (!player.isClimbing) {
                        let onPlatform = false;
                        const playerCX = player.x + player.width / 2;
                        const playerFootY = player.y + player.height;

                        // 현재 위치에서 발 밑 플랫폼 탐색
                        for (let plat of activeStage.platforms) {
                            // 발판 상단과의 세로 거리 차이가 오차범위 내이고 하강 중일 때만 안착
                            if (Math.abs(playerFootY - plat.y) < 6 && player.vy >= 0) {
                                // 해당 발판 가로 조각 세그먼트 위에 있는가 검증
                                for (let seg of plat.segments) {
                                    if (playerCX >= seg.x1 && playerCX <= seg.x2) {
                                        onPlatform = true;
                                        player.y = plat.y - player.height;
                                        player.vy = 0;
                                        if (!player.isGrounded) {
                                            // 낙하 높이 확인용 데미지 판정
                                            if (player.vy > 8.5) { // 과도한 자유 낙하 시 사망
                                                triggerDeath();
                                                return;
                                            }
                                            player.isGrounded = true;
                                            player.hasDoubleJumped = false; // 안착 시 이단 도약 트리거 초기화
                                        }
                                        break;
                                    }
                                }
                            }
                        }

                        // 허공으로 떨어지는 경우
                        if (!onPlatform && player.isGrounded) {
                            player.isGrounded = false;
                            player.jumpLockedDir = player.vx > 0 ? 1 : (player.vx < 0 ? -1 : 0);
                        }

                        // 화면 맨 아래 낭떠러지로 추락한 경우 즉사
                        if (player.y > 480) {
                            triggerDeath();
                            return;
                        }
                    }
                }

                // 2. 가시 장애물 충돌 검사
                if (player.shieldTicks <= 0) {
                    for (let spike of activeStage.spikes) {
                        const dist = Math.hypot((player.x + player.width/2) - spike.x, (player.y + player.height - 4) - spike.y);
                        if (dist < 14) {
                            triggerDeath();
                            return;
                        }
                    }
                }

                // 3. 아이템 수집 분석
                for (let i = 0; i < activeStage.items.length; i++) {
                    const item = activeStage.items[i];
                    const dist = Math.hypot((player.x + player.width/2) - item.x, (player.y + player.height/2) - item.y);
                    if (dist < 18) {
                        // 아이템 획득
                        activeStage.items.splice(i, 1);
                        i--;

                        if (item.type === 'apple') {
                            score += 100;
                            createParticles(item.x, item.y, '#ff4d4d', 12);
                            createFloatingText("+100", item.x, item.y - 10, '#f87171');
                            playSound('pickup');
                        } else if (item.type === 'pot') {
                            // 물음표 단지 특수 이벤트 분기
                            const r = Math.random();
                            if (r < 0.4) {
                                score += 500;
                                createFloatingText("+500 BONUS!", item.x, item.y - 10, '#facc15');
                                playSound('pot');
                            } else if (r < 0.7) {
                                player.shieldTicks = 360; // 6초 보호막 무적 버프
                                createFloatingText("SHIELD!", item.x, item.y - 10, '#38bdf8');
                                playSound('pot');
                            } else {
                                player.speedBoostTicks = 360; // 6초 이속 증가 버프
                                createFloatingText("SPEED UP!", item.x, item.y - 10, '#4ade80');
                                playSound('pot');
                            }
                            createParticles(item.x, item.y, '#eab308', 20);
                        }

                        if (score > topScore) topScore = score;

                        // 스테이지 올 클리어 판단
                        if (activeStage.items.length === 0) {
                            gameState = 'CLEAR';
                            clearTicks = 150; // 승리 축하 프레임 유지 시간
                            playSound('win');
                        }
                    }
                }

                // 4. 순찰 애벌레(몬스터) 충돌 연산 및 순찰 경로 업데이트
                for (let enemy of activeStage.enemies) {
                    enemy.x += enemy.speed * enemy.dir;
                    if (enemy.x <= enemy.minX || enemy.x >= enemy.maxX) {
                        enemy.dir *= -1;
                        enemy.x = enemy.dir === 1 ? enemy.minX : enemy.maxX;
                    }

                    // 플레이어 유효 충돌 감지
                    if (player.shieldTicks <= 0) {
                        const ex = enemy.x;
                        const ey = enemy.y - 10;
                        const px = player.x + player.width / 2;
                        const py = player.y + player.height / 2;
                        const dist = Math.hypot(px - ex, py - ey);
                        if (dist < 18) {
                            triggerDeath();
                            return;
                        }
                    }
                }
            }

            // 부수 효과 업데이트 (파티클 & 부유 텍스트)
            for (let i = 0; i < particles.length; i++) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.alpha -= p.decay;
                if (p.alpha <= 0) {
                    particles.splice(i, 1);
                    i--;
                }
            }

            for (let i = 0; i < floatingTexts.length; i++) {
                const ft = floatingTexts[i];
                ft.y += ft.vy;
                ft.ticks--;
                if (ft.ticks <= 0) {
                    floatingTexts.splice(i, 1);
                    i--;
                }
            }
        }

        // 너구리 사망 트리거 실행기
        function triggerDeath() {
            gameState = 'DYING';
            player.dyingY = player.y;
            player.dyingVy = -5.5; // 소폭 상승 후 낙하 연출
            player.dyingRot = 0;
            playSound('die');
        }

        // --- 2D 그래픽 자산 직접 백터 드로잉 ---

        // 너구리(Raccoon) 그리기
        function drawRaccoon(ctx, x, y, width, height, facing, state, animFrame) {
            ctx.save();
            
            // 바닥 어두운 그림자 타원
            ctx.beginPath();
            ctx.ellipse(x + width/2, y + height - 2, width/2, 4, 0, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(0, 0, 0, 0.45)';
            ctx.fill();

            // 왼쪽 바라보기 스케일 반전 트랜스폼
            ctx.translate(x + width/2, y + height/2);
            if (facing === 'left') {
                ctx.scale(-1, 1);
            }

            // 풍성한 줄무늬 꼬리
            ctx.save();
            ctx.translate(-width/3, height/5);
            ctx.rotate(Math.sin(animFrame * 0.4) * 0.35 + (state === 'jump' ? -0.5 : 0));
            ctx.beginPath();
            ctx.ellipse(-8, 0, 13, 6.5, -Math.PI/6, 0, Math.PI * 2);
            ctx.fillStyle = '#8B4513';
            ctx.fill();
            // 꼬리 패턴 줄무늬 레이어
            ctx.fillStyle = '#2f1a0c';
            ctx.beginPath();
            ctx.ellipse(-11, -2, 4, 5.5, -Math.PI/6, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(-5, 1, 4, 5.5, -Math.PI/6, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();

            // 몸통
            ctx.beginPath();
            ctx.ellipse(0, height/8, width/2.1, height/3, 0, 0, Math.PI * 2);
            ctx.fillStyle = '#A0522D';
            ctx.fill();

            // 가슴 앞부분 흰 털 장식
            ctx.beginPath();
            ctx.ellipse(width/6, height/8, width/4, height/5.2, 0, 0, Math.PI * 2);
            ctx.fillStyle = '#FFE4C4';
            ctx.fill();

            // 머리 얼굴형
            ctx.beginPath();
            ctx.arc(width/8, -height/4, width/2.2, 0, Math.PI * 2);
            ctx.fillStyle = '#A0522D';
            ctx.fill();

            // 밝은 얼굴 가림털 영역
            ctx.beginPath();
            ctx.ellipse(width/6, -height/4 + 1, width/2.7, height/5, 0, 0, Math.PI * 2);
            ctx.fillStyle = '#FFE4C4';
            ctx.fill();

            // 눈동자 주변 너구리 검은 마스크
            ctx.beginPath();
            ctx.ellipse(width/4, -height/4, width/4, height/8, Math.PI/12, 0, Math.PI * 2);
            ctx.fillStyle = '#2F4F4F';
            ctx.fill();

            // 눈동자
            ctx.beginPath();
            ctx.arc(width/4 + 2, -height/4, 2.5, 0, Math.PI * 2);
            ctx.fillStyle = '#000';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(width/4 + 3, -height/4 - 1, 0.8, 0, Math.PI * 2);
            ctx.fillStyle = '#FFF';
            ctx.fill();

            // 코와 주둥이
            ctx.beginPath();
            ctx.ellipse(width/2.2, -height/4 + 3, 4, 3, 0, 0, Math.PI * 2);
            ctx.fillStyle = '#FFE4C4';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(width/2.2 + 2, -height/4 + 2, 2.2, 0, Math.PI * 2);
            ctx.fillStyle = '#000';
            ctx.fill();

            // 양 귀
            ctx.beginPath(); // 뒷귀
            ctx.moveTo(-width/6, -height/2);
            ctx.lineTo(-width/3, -height/3);
            ctx.lineTo(0, -height/3);
            ctx.closePath();
            ctx.fillStyle = '#8B4513';
            ctx.fill();
            
            ctx.beginPath(); // 앞귀
            ctx.moveTo(width/6, -height/2);
            ctx.lineTo(0, -height/3);
            ctx.lineTo(width/3, -height/3);
            ctx.closePath();
            ctx.fillStyle = '#A0522D';
            ctx.fill();
            ctx.beginPath(); // 핑크 귀 내장막
            ctx.moveTo(width/6 + 1, -height/2 + 2.5);
            ctx.lineTo(width/12 + 1, -height/3 - 0.5);
            ctx.lineTo(width/4 - 1, -height/3 - 0.5);
            ctx.closePath();
            ctx.fillStyle = '#FFA07A';
            ctx.fill();

            // 발 부분 애니메이션
            ctx.fillStyle = '#5C4033';
            let legOffset = Math.sin(animFrame * 0.4) * 4.5;
            if (state === 'climbing') {
                ctx.fillRect(-6, height/2 - 2, 4.5, 4.5);
                ctx.fillRect(2, height/2 - 5, 4.5, 4.5);
            } else if (state === 'jump') {
                ctx.fillRect(-6, height/2 - 1, 4.5, 5);
                ctx.fillRect(2, height/2 - 1, 4.5, 5);
            } else {
                ctx.fillRect(-6, height/2 - 3 + legOffset, 4.5, 5);
                ctx.fillRect(2, height/2 - 3 - legOffset, 4.5, 5);
            }

            // 무적 보호막 활성화 시 이펙트 서클
            if (player.shieldTicks > 0) {
                ctx.beginPath();
                ctx.arc(0, 0, width * 1.15, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(56, 189, 248, ${0.5 + Math.sin(Date.now() * 0.015) * 0.35})`;
                ctx.lineWidth = 2.5;
                ctx.stroke();
            }

            ctx.restore();
        }

        // 반짝이는 사과 그리기
        function drawApple(ctx, x, y, size = 10) {
            ctx.save();
            
            // 꼭지 줄기
            ctx.beginPath();
            ctx.strokeStyle = '#8B4513';
            ctx.lineWidth = 1.8;
            ctx.arc(x + 2, y - size + 2, size * 0.8, Math.PI, Math.PI * 1.5);
            ctx.stroke();

            // 푸른 잎사귀
            ctx.beginPath();
            ctx.ellipse(x + 5, y - size - 1, size * 0.45, size * 0.2, -Math.PI / 6, 0, Math.PI * 2);
            ctx.fillStyle = '#228B22';
            ctx.fill();

            // 사과 알맹이 그라데이션
            const grad = ctx.createRadialGradient(x - size/3, y - size/3, 1, x, y, size);
            grad.addColorStop(0, '#FF4500');
            grad.addColorStop(0.3, '#FF0000');
            grad.addColorStop(1, '#800000');

            ctx.beginPath();
            ctx.arc(x - size/4, y, size * 0.82, 0, Math.PI * 2);
            ctx.arc(x + size/4, y, size * 0.82, 0, Math.PI * 2);
            ctx.fillStyle = grad;
            ctx.fill();

            // 구체 광원 반사 하이라이트
            ctx.beginPath();
            ctx.ellipse(x - size/3, y - size/3, size * 0.28, size * 0.14, Math.PI / 4, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.75)';
            ctx.fill();
            ctx.restore();
        }

        // 황금빛 물음표 보물 단지 그리기
        function drawPot(ctx, x, y, size = 11) {
            ctx.save();
            
            // 바닥 약한 음영 타원
            ctx.beginPath();
            ctx.ellipse(x, y + size, size, size * 0.25, 0, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(0,0,0,0.35)';
            ctx.fill();

            // 도자기 단지 외관 렌더링
            const grad = ctx.createRadialGradient(x - size/3, y - size/3, 1, x, y, size);
            grad.addColorStop(0, '#FFFa90');
            grad.addColorStop(0.35, '#FFD700');
            grad.addColorStop(1, '#9e7800');

            ctx.beginPath();
            ctx.moveTo(x - size * 0.65, y - size * 0.7);
            ctx.bezierCurveTo(x - size * 1.35, y - size * 0.35, x - size * 1.25, y + size * 0.75, x - size * 0.55, y + size * 0.95);
            ctx.lineTo(x + size * 0.55, y + size * 0.95);
            ctx.bezierCurveTo(x + size * 1.25, y + size * 0.75, x + size * 1.35, y - size * 0.35, x + size * 0.65, y - size * 0.7);
            ctx.closePath();
            ctx.fillStyle = grad;
            ctx.fill();

            // 입구 뚜껑 테두리
            ctx.beginPath();
            ctx.ellipse(x, y - size * 0.7, size * 0.65, size * 0.15, 0, 0, Math.PI * 2);
            ctx.fillStyle = '#8B6508';
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(x, y - size * 0.7, size * 0.55, size * 0.08, 0, 0, Math.PI * 2);
            ctx.fillStyle = '#000000';
            ctx.fill();

            // 중앙 파란 물음표 마크
            ctx.font = `bold ${size * 1.25}px 'Courier New', sans-serif`;
            ctx.fillStyle = '#1e40af';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('?', x, y + size * 0.12);
            ctx.restore();
        }

        // 오리지널 패턴 순찰 애벌레 그리기
        function drawEnemy(ctx, x, y, width = 30, height = 20, animFrame, dir) {
            ctx.save();
            ctx.translate(x + width/2, y + height/2);
            if (dir === -1) {
                ctx.scale(-1, 1);
            }

            // 고유 세그먼트 마디 관절 5단 렌더링
            const segmentCount = 5;
            const radius = width / 6.5;
            for (let i = segmentCount - 1; i >= 0; i--) {
                const segX = -width/2.2 + i * (width/5.2);
                const segY = Math.sin(animFrame * 0.35 + i) * 3;
                
                ctx.beginPath();
                ctx.arc(segX, segY, radius, 0, Math.PI * 2);
                // 오리지널 복고풍 파랑/황토색 교차 배치
                ctx.fillStyle = (i % 2 === 0) ? '#4a72ff' : '#ffd524';
                ctx.fill();
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 1.2;
                ctx.stroke();

                // 꼼지락 다리 발 구현
                ctx.beginPath();
                ctx.moveTo(segX - 1, segY + radius);
                ctx.lineTo(segX - 3 + Math.sin(animFrame * 0.45 + i) * 2, segY + radius + 4);
                ctx.moveTo(segX + 1, segY + radius);
                ctx.lineTo(segX + 1 + Math.sin(animFrame * 0.45 + i + Math.PI) * 2, segY + radius + 4);
                ctx.strokeStyle = '#000000';
                ctx.lineWidth = 1.6;
                ctx.stroke();
            }

            // 대가리 세그먼트 마디
            const headX = width/2.2 - radius;
            const headY = Math.sin(animFrame * 0.35) * 3;
            ctx.beginPath();
            ctx.arc(headX, headY, radius * 1.35, 0, Math.PI * 2);
            ctx.fillStyle = '#4a72ff';
            ctx.fill();
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 1.2;
            ctx.stroke();

            // 애니메 고글 안구
            ctx.beginPath();
            ctx.arc(headX + 2, headY - 2.2, 3.2, 0, Math.PI * 2);
            ctx.fillStyle = '#FFFFFF';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(headX + 2.5, headY - 2.2, 1.4, 0, Math.PI * 2);
            ctx.fillStyle = '#000000';
            ctx.fill();

            // 머리 뿔 안테나 촉수
            ctx.beginPath();
            ctx.moveTo(headX, headY - radius);
            ctx.quadraticCurveTo(headX - 1, headY - radius - 7, headX - 4, headY - radius - 9);
            ctx.moveTo(headX + 2, headY - radius);
            ctx.quadraticCurveTo(headX + 3, headY - radius - 7, headX + 6, headY - radius - 9);
            ctx.strokeStyle = '#FFFF00';
            ctx.lineWidth = 1.5;
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(headX - 4, headY - radius - 9, 1.8, 0, Math.PI * 2);
            ctx.arc(headX + 6, headY - radius - 9, 1.8, 0, Math.PI * 2);
            ctx.fillStyle = '#FF0000';
            ctx.fill();

            ctx.restore();
        }

        // 삼각 지상 은색 압정(가시) 그리기
        function drawSpike(ctx, x, y, size = 10) {
            ctx.save();
            
            // 압정 삼각 날
            ctx.beginPath();
            ctx.moveTo(x - size, y);
            ctx.lineTo(x, y - size);
            ctx.lineTo(x + size, y);
            ctx.closePath();
            
            const fillGradient = ctx.createLinearGradient(x - size, y, x + size, y);
            fillGradient.addColorStop(0, '#7c8a99');
            fillGradient.addColorStop(0.5, '#f3f4f6');
            fillGradient.addColorStop(1, '#4b5563');
            
            ctx.fillStyle = fillGradient;
            ctx.fill();
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 1;
            ctx.stroke();
            
            // 반짝이는 사선 광원 이펙트
            ctx.beginPath();
            ctx.moveTo(x, y - size);
            ctx.lineTo(x + 2, y);
            ctx.strokeStyle = 'rgba(255,255,255,0.7)';
            ctx.lineWidth = 1;
            ctx.stroke();

            // 밑바닥 둥근 평판 받침
            ctx.beginPath();
            ctx.ellipse(x, y, size, 2.2, 0, 0, Math.PI * 2);
            ctx.fillStyle = '#4b5563';
            ctx.fill();
            ctx.strokeStyle = '#000000';
            ctx.stroke();

            ctx.restore();
        }

        // 볼트 너트 리벳 디테일 메탈릭 은색 지상 발판 그리기
        function drawPlatform(ctx, x1, x2, y) {
            ctx.save();
            const height = 16;
            
            // 1. 발판 기본 기둥 바디 색 채우기
            ctx.fillStyle = '#8e8e8e';
            ctx.fillRect(x1, y, x2 - x1, height);

            // 2. 금속 하이라이트 상단 광택 라인
            ctx.fillStyle = '#ececec';
            ctx.fillRect(x1, y, x2 - x1, 2.5);

            // 3. 금속 입체 쉐도우 하단 블랙 보더 라인
            ctx.fillStyle = '#4d4d4d';
            ctx.fillRect(x1, y + height - 2.5, x2 - x1, 2.5);

            // 4. 발판 전체 경계 외곽선 테두리
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 1.5;
            ctx.strokeRect(x1, y, x2 - x1, height);

            // 5. 철판 마디 패널 및 결속 리벳 볼트 구멍 데코레이션 그리기
            ctx.strokeStyle = '#2d2d2d';
            ctx.lineWidth = 1;
            const segmentInterval = 30; // 30픽셀 주기 철판 패널 라인
            for (let px = Math.ceil(x1 / segmentInterval) * segmentInterval; px < x2; px += segmentInterval) {
                ctx.beginPath();
                ctx.moveTo(px, y);
                ctx.lineTo(px, y + height);
                ctx.stroke();

                // 볼트 못 머리 장식 이중색
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(px - 4, y + 4, 1.5, 1.5);
                ctx.fillRect(px - 4, y + height - 6, 1.5, 1.5);
                ctx.fillStyle = '#000000';
                ctx.fillRect(px - 3, y + 4.5, 1, 1);
                ctx.fillRect(px - 3, y + height - 5.5, 1, 1);
            }
            ctx.restore();
        }

        // 황금빛 사다리 렌더링 함수
        function drawLadder(ctx, x, y1, y2) {
            ctx.save();
            const ladderWidth = 20;
            const rx = x - ladderWidth / 2;

            // 뒷면 투명 그림자 레일 효과
            ctx.fillStyle = 'rgba(0,0,0,0.4)';
            ctx.fillRect(rx + 2, y1, ladderWidth, y2 - y1);

            // 주황빛 레일 기둥
            ctx.fillStyle = '#d97706';
            ctx.fillRect(rx, y1, 3.5, y2 - y1);
            ctx.fillRect(rx + ladderWidth - 3.5, y1, 3.5, y2 - y1);

            // 노란빛 레일 광원 이너 데코
            ctx.fillStyle = '#fef08a';
            ctx.fillRect(rx + 1, y1, 1.5, y2 - y1);
            ctx.fillRect(rx + ladderWidth - 2.5, y1, 1.5, y2 - y1);

            // 사다리 발판 칸막이(Rung) 간격 연산 그리기
            const step = 8; // 8픽셀 간격 사다리 기둥
            ctx.fillStyle = '#f59e0b';
            for (let ly = y1 + 4; ly < y2; ly += step) {
                ctx.fillRect(rx, ly, ladderWidth, 2.5);
                // 발판 하이라이트
                ctx.fillStyle = '#fef08a';
                ctx.fillRect(rx, ly, ladderWidth, 1);
                ctx.fillStyle = '#f59e0b';
            }

            // 상하단 고정 조인트 결속 볼트 데코
            ctx.fillStyle = '#000000';
            ctx.fillRect(rx - 1, y1, 2, 2);
            ctx.fillRect(rx + ladderWidth - 1, y1, 2, 2);
            ctx.fillRect(rx - 1, y2 - 2, 2, 2);
            ctx.fillRect(rx + ladderWidth - 1, y2 - 2, 2, 2);

            ctx.restore();
        }

        // 사이드바 세로 3D 한글 타이틀 '너구리' 구현
        function drawRetroTitle(ctx) {
            const chars = ['너', '구', '리'];
            const startY = 110;
            const spacing = 80;
            const x = 700;

            ctx.save();
            ctx.font = 'bold 58px "Courier New", "Malgun Gothic", sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            chars.forEach((char, index) => {
                const cy = startY + index * spacing;

                // 1단계. 심부 외곽 짙은 블랙 아웃라인 피어싱
                ctx.fillStyle = '#000000';
                for (let dx = -4; dx <= 4; dx++) {
                    for (let dy = -4; dy <= 4; dy++) {
                        if (Math.abs(dx) + Math.abs(dy) > 0) {
                            ctx.fillText(char, x + dx, cy + dy);
                        }
                    }
                }

                // 2단계. 오리지널 블루 3D 입체 투영 그림자 겹그리기
                for (let offset = 4; offset > 0; offset--) {
                    ctx.fillStyle = '#1d4ed8'; 
                    ctx.fillText(char, x + offset, cy + offset);
                }

                // 3단계. 주광원 밝은 네온 스카이 블루 채색
                ctx.fillStyle = '#38bdf8'; 
                ctx.fillText(char, x, cy);

                // 4단계. 입체감 배가를 위한 상단 하이라이트 인레이
                ctx.fillStyle = '#e0f2fe';
                ctx.font = 'bold 54px "Courier New", "Malgun Gothic", sans-serif';
                ctx.fillText(char, x - 1, cy - 1);
            });
            ctx.restore();
        }

        // --- 메인 그래픽 렌더링 루프 ---
        function draw() {
            // 전체 캔버스 소거
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 좌측 아케이드 구역과 우측 점수판을 가르는 세로 빔 라인
            ctx.fillStyle = '#3b3b5c';
            ctx.fillRect(600, 0, 4, 460);
            ctx.fillRect(0, 458, 800, 4);

            // 하단 조인트 기둥 브라켓 데코레이션
            ctx.fillStyle = '#7c7c9c';
            ctx.fillRect(20, 440, 6, 20);
            ctx.fillRect(594, 440, 6, 20);
            ctx.fillRect(774, 440, 6, 20);

            // 상단 스코어보드 공통 영역 렌더링
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 20px "Courier New", monospace';
            ctx.textAlign = 'left';
            ctx.fillStyle = '#38bdf8';
            ctx.fillText('SCORE', 30, 24);
            ctx.fillStyle = '#ff4d4d';
            ctx.fillText('TOP SCORE', 350, 24);

            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 24px "Courier New", monospace';
            ctx.fillText(String(score).padStart(8, '0'), 100, 24);
            ctx.fillText(String(topScore).padStart(8, '0'), 470, 24);

            // 인트로 화면 상태 렌더링
            if (gameState === 'START') {
                ctx.save();
                // 타이틀 로고
                ctx.textAlign = 'center';
                ctx.fillStyle = '#fb7185';
                ctx.font = 'bold 48px "Courier New", monospace';
                ctx.fillText('RETRO NEOGURI', 300, 160);
                
                ctx.fillStyle = '#38bdf8';
                ctx.font = 'bold 24px "Courier New", monospace';
                ctx.fillText('너구리 아케이드 웹앱', 300, 210);

                // 반짝이는 프레스 스페이스 스타트 가이드
                if (Math.floor(Date.now() / 400) % 2 === 0) {
                    ctx.fillStyle = '#fbbf24';
                    ctx.font = 'bold 20px "Courier New", monospace';
                    ctx.fillText('PRESS SPACE OR TOUCH TO PLAY', 300, 310);
                }

                // 조작 가이드 아이콘 데코
                ctx.fillStyle = '#9ca3af';
                ctx.font = '14px "Courier New", monospace';
                ctx.fillText('← → : 이동  |  ↑ ↓ : 사다리  |  Space : 점프', 300, 370);
                ctx.restore();

                // 우측 사이드바는 항시 렌더링
                drawRightSidebar();
                return;
            }

            if (gameState === 'GAMEOVER') {
                ctx.save();
                ctx.textAlign = 'center';
                ctx.fillStyle = '#ef4444';
                ctx.font = 'bold 50px "Courier New", monospace';
                ctx.fillText('GAME OVER', 300, 220);

                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 20px "Courier New", monospace';
                ctx.fillText(`최종 점수: ${score}`, 300, 270);

                if (Math.floor(Date.now() / 400) % 2 === 0) {
                    ctx.fillStyle = '#f59e0b';
                    ctx.fillText('PRESS SPACE TO RESTART', 300, 330);
                }
                ctx.restore();
                drawRightSidebar();
                return;
            }

            // 인플레이 상태 그래픽 오브젝트 드로잉
            if (activeStage) {
                // 1. 사다리 그리기
                for (let lad of activeStage.ladders) {
                    drawLadder(ctx, lad.x, lad.y1, lad.y2);
                }

                // 2. 가시 그리기
                for (let spike of activeStage.spikes) {
                    drawSpike(ctx, spike.x, spike.y);
                }

                // 3. 발판 플랫폼 그리기
                for (let plat of activeStage.platforms) {
                    for (let seg of plat.segments) {
                        drawPlatform(ctx, seg.x1, seg.x2, plat.y);
                    }
                }

                // 4. 수집용 아이템 사과/물음표 단지 그리기
                for (let item of activeStage.items) {
                    if (item.type === 'apple') {
                        drawApple(ctx, item.x, item.y);
                    } else if (item.type === 'pot') {
                        drawPot(ctx, item.x, item.y);
                    }
                }

                // 5. 파티클 이펙트 드로잉
                for (let p of particles) {
                    ctx.save();
                    ctx.globalAlpha = p.alpha;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fillStyle = p.color;
                    ctx.fill();
                    ctx.restore();
                }

                // 6. 애벌레 몬스터 그리기
                for (let enemy of activeStage.enemies) {
                    drawEnemy(ctx, enemy.x - 15, enemy.y - 20, 30, 20, player.animFrame, enemy.dir);
                }

                // 7. 메인 캐릭터 너구리 드로잉
                if (gameState === 'DYING') {
                    // 회전 낙사 애니메이션
                    ctx.save();
                    ctx.translate(player.x + player.width/2, player.dyingY + player.height/2);
                    ctx.rotate(player.dyingRot);
                    drawRaccoon(ctx, -player.width/2, -player.height/2, player.width, player.height, player.facing, 'jump', player.animFrame);
                    ctx.restore();
                } else if (gameState === 'PLAYING') {
                    const charState = player.isClimbing ? 'climbing' : (player.isGrounded ? 'walk' : 'jump');
                    drawRaccoon(ctx, player.x, player.y, player.width, player.height, player.facing, charState, player.animFrame);
                }

                // 8. 팝업 플로팅 스코어 텍스트 드로잉
                for (let ft of floatingTexts) {
                    ctx.save();
                    ctx.fillStyle = ft.color || '#ffffff';
                    ctx.font = 'bold 14px "Courier New", monospace';
                    ctx.textAlign = 'center';
                    ctx.fillText(ft.text, ft.x, ft.y);
                    ctx.restore();
                }

                // 9. 하단 스테이지 제한 시간 게이지 (체커보드 보너스 바)
                drawBonusTimerBar();
            }

            // 스테이지 진입 인트로 화면 오버레이
            if (gameState === 'INTRO') {
                ctx.save();
                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                ctx.fillRect(0, 0, 600, 460);

                ctx.textAlign = 'center';
                ctx.fillStyle = '#38bdf8';
                ctx.font = 'bold 36px "Courier New", monospace';
                ctx.fillText(`STAGE ${currentStageIndex + 1}`, 300, 200);

                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 18px "Courier New", monospace';
                ctx.fillText('READY!', 300, 260);
                ctx.restore();
            }

            // 스테이지 완료(CLEAR) 점수 정산 화면 오버레이
            if (gameState === 'CLEAR') {
                ctx.save();
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(0, 0, 600, 460);

                ctx.textAlign = 'center';
                ctx.fillStyle = '#4ade80';
                ctx.font = 'bold 36px "Courier New", monospace';
                ctx.fillText('STAGE CLEAR!', 300, 180);

                ctx.fillStyle = '#fef08a';
                ctx.font = 'bold 20px "Courier New", monospace';
                ctx.fillText(`TIME BONUS: ${timer * 2}`, 300, 240);
                ctx.restore();
            }

            // 우측 사이드바 점수판 최종 렌더링
            drawRightSidebar();
        }

        // 오리지널 하단 보너스 프레임 바 (퍼플 체커보드 질감 완벽 재현)
        function drawBonusTimerBar() {
            const bx = 120;
            const by = 470;
            const bw = 360;
            const bh = 14;

            ctx.save();
            // 시간 경과 타이틀
            ctx.fillStyle = '#4ade80';
            ctx.font = 'bold 16px "Courier New", monospace';
            ctx.textAlign = 'right';
            ctx.fillText('TIME', bx - 10, by + 12);

            // 타이머 백그라운드 박스
            ctx.strokeStyle = '#3b3b5c';
            ctx.lineWidth = 1.5;
            ctx.strokeRect(bx, by, bw, bh);

            // 채워진 남은 시간 영역 비율 연산
            const currentW = (timer / maxTimer) * bw;
            
            // 퍼플 레트로 체커보드 바둑판 패턴 제작
            ctx.save();
            ctx.beginPath();
            ctx.rect(bx, by, currentW, bh);
            ctx.clip();

            const dotSize = 7;
            for (let x = bx; x < bx + bw; x += dotSize) {
                for (let y = by; y < by + bh; y += dotSize) {
                    if ((Math.floor(x / dotSize) + Math.floor(y / dotSize)) % 2 === 0) {
                        ctx.fillStyle = '#a855f7'; // 밝은 보라
                    } else {
                        ctx.fillStyle = '#4c1d95'; // 어두운 보라
                    }
                    ctx.fillRect(x, y, dotSize, dotSize);
                }
            }
            ctx.restore();
            ctx.restore();
        }

        // 우측 사이드바 텍스트 및 오리지널 미니어처 아이콘 그리기
        function drawRightSidebar() {
            // 한글 세로 너구리 간판
            drawRetroTitle(ctx);

            const startX = 620;
            
            // 사과 가치 스코어 보드
            drawApple(ctx, startX + 25, 335, 9);
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 20px "Courier New", monospace';
            ctx.fillText('= 100', startX + 50, 342);

            // 남은 체력(목숨) 인디케이터
            ctx.save();
            // 너구리 미니 페이스 직접 드로잉
            const rx = startX + 25;
            const ry = 385;
            ctx.beginPath();
            ctx.arc(rx, ry, 11, 0, Math.PI * 2);
            ctx.fillStyle = '#A0522D';
            ctx.fill();
            // 안면 가림막 털
            ctx.beginPath();
            ctx.ellipse(rx + 2, ry + 1, 9, 6.5, 0, 0, Math.PI * 2);
            ctx.fillStyle = '#FFE4C4';
            ctx.fill();
            // 검은 마스크 눈
            ctx.beginPath();
            ctx.ellipse(rx + 3.5, ry, 6, 3, Math.PI/12, 0, Math.PI * 2);
            ctx.fillStyle = '#2F4F4F';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(rx + 4, ry, 1.5, 0, Math.PI * 2);
            ctx.fillStyle = '#000000';
            ctx.fill();
            ctx.restore();

            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 20px "Courier New", monospace';
            ctx.fillText(`= ${lives}`, startX + 50, 392);

            // 스테이지(STG) 및 크레딧(CRD) 표시판
            ctx.fillStyle = '#38bdf8';
            ctx.font = 'bold 20px "Courier New", monospace';
            ctx.fillText(`STG: ${currentStageIndex + 1}`, startX + 10, 440);
            
            ctx.fillStyle = '#a855f7';
            ctx.fillText(`CRD: ${credits}`, startX + 115, 440);

            // 오리지널 복고 로고 'HSK' 장식
            ctx.save();
            const bx = startX + 65;
            const by = 465;
            ctx.fillStyle = '#1e1e38';
            ctx.fillRect(bx, by, 50, 22);
            ctx.strokeStyle = '#f43f5e';
            ctx.lineWidth = 1.5;
            ctx.strokeRect(bx, by, 50, 22);

            ctx.fillStyle = '#f43f5e';
            ctx.font = 'bold 12px "Courier New", monospace';
            ctx.textAlign = 'center';
            ctx.fillText('HSK', bx + 25, by + 15);
            ctx.restore();
        }

        // --- 실시간 메인 게임 프레임워크 루프 ---
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // 첫 프레임 가동 개시
        gameLoop();
    </script>
</body>
</html>
